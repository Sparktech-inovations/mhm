<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smart School Bell Panel</title>

<style>
body {
    font-family: 'Segoe UI';
    margin: 0;
    background: #1e1e2f;
    color: white;
}
.container { width: 95%; margin: auto; margin-top: 20px; }
.card {
    background: white;
    color: black;
    padding: 15px;
    border-radius: 10px;
    margin-bottom: 20px;
}
input { padding: 6px; margin: 5px; }
button { padding: 6px 12px; margin: 3px; cursor: pointer; }

.addBtn { background: green; color: white; }
.deleteBtn { background: red; color: white; }
.ringBtn { background: orange; color: white; }

.hidden { display: none; }

.timeRow { margin-bottom: 5px; }
</style>
</head>

<body>

<div class="container">

<!-- LOGIN -->
<div class="card" id="loginBox">
<h3>Login</h3>
<input id="username" placeholder="Username"><br>
<input id="password" type="password" placeholder="Password"><br>
<button onclick="login()">Login</button>
</div>

<!-- DASHBOARD -->
<div class="card hidden" id="dashboard">

<h3>Create Schedule</h3>

<div id="daySelection">
<label><input type="checkbox" value="Monday">Mon</label>
<label><input type="checkbox" value="Tuesday">Tue</label>
<label><input type="checkbox" value="Wednesday">Wed</label>
<label><input type="checkbox" value="Thursday">Thu</label>
<label><input type="checkbox" value="Friday">Fri</label>
<label><input type="checkbox" value="Saturday">Sat</label>
<label><input type="checkbox" value="Sunday">Sun</label>
</div>

<h4>Timings</h4>

<div id="timingsContainer">
<div class="timeRow">
<input type="number" class="hour" placeholder="Hour" min="0" max="23">
<input type="number" class="minute" placeholder="Minute" min="0" max="59">
<input type="number" class="duration" placeholder="Duration">
<button onclick="removeRow(this)">❌</button>
</div>
</div>

<button onclick="addRow()">➕ Add Time</button>

<br><br>

<button class="addBtn" id="uploadBtn" onclick="addSchedule()">Upload Schedule</button>

<p id="limitMsg" style="color:red; display:none;">
⚠️ Max 15 schedules reached. Delete one to add new.
</p>

<h3>Schedules</h3>

<table border="1" width="100%" id="table">
<tr>
<th>Days</th>
<th>Timings</th>
<th>Actions</th>
</tr>
</table>

</div>
</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

<script>

// 🔥 CONFIG (same as yours)
const firebaseConfig = {
apiKey: "YOUR_KEY",
authDomain: "YOUR_PROJECT.firebaseapp.com",
databaseURL: "YOUR_DB_URL",
projectId: "YOUR_PROJECT"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// 🔐 LOGIN
function login(){
if(username.value==="srjadhav" && password.value==="7588"){
loginBox.classList.add("hidden");
dashboard.classList.remove("hidden");
}else{
alert("Wrong login");
}
}

// ➕ ADD ROW
function addRow(){
let div = document.createElement("div");
div.className = "timeRow";

div.innerHTML = `
<input type="number" class="hour" placeholder="Hour" min="0" max="23">
<input type="number" class="minute" placeholder="Minute" min="0" max="59">
<input type="number" class="duration" placeholder="Duration">
<button onclick="removeRow(this)">❌</button>
`;

timingsContainer.appendChild(div);
}

// ❌ REMOVE ROW
function removeRow(btn){
btn.parentElement.remove();
}

// 🔁 GLOBAL TRACK
let usedDays = {};
let scheduleCount = 0;

// 🔄 LOAD DATA
db.ref("SchoolBell/schedules").on("value", snap => {

let table = document.getElementById("table");
table.innerHTML = `<tr><th>Days</th><th>Timings</th><th>Actions</th></tr>`;

usedDays = {};
scheduleCount = 0;

snap.forEach(child => {

scheduleCount++;

let data = child.val();

// Track used days
data.days?.forEach(d => usedDays[d] = child.key);

// Format days
let days = data.days?.join(", ") || "";

// Format timings
let timings = "";
data.timings?.forEach(t=>{
timings += `${t.hour}:${t.minute} (${t.duration}s)<br>`;
});

// Add row
let row = table.insertRow();
row.insertCell(0).innerHTML = days;
row.insertCell(1).innerHTML = timings;

row.insertCell(2).innerHTML = `
<button class="deleteBtn" onclick="deleteSchedule('${child.key}')">Delete</button>
<button class="ringBtn" onclick="editDays('${child.key}', ${JSON.stringify(data.days)})">Edit Days</button>
`;

});

// LIMIT
if(scheduleCount>=15){
uploadBtn.disabled = true;
limitMsg.style.display = "block";
}else{
uploadBtn.disabled = false;
limitMsg.style.display = "none";
}

});

// ➕ ADD SCHEDULE
function addSchedule(){

let selectedDays = [];

document.querySelectorAll("#daySelection input:checked").forEach(cb=>{
selectedDays.push(cb.value);
});

if(selectedDays.length===0){
alert("Select days");
return;
}

// CHECK DAY CONFLICT
for(let d of selectedDays){
if(usedDays[d]){
alert(d+" already has schedule");
return;
}
}

// GET TIMINGS
let timings = [];

document.querySelectorAll(".timeRow").forEach(row=>{

let h = parseInt(row.querySelector(".hour").value);
let m = parseInt(row.querySelector(".minute").value);
let d = parseInt(row.querySelector(".duration").value);

if(!isNaN(h)&&!isNaN(m)&&!isNaN(d)){
timings.push({hour:h, minute:m, duration:d});
}

});

if(timings.length===0){
alert("Add valid timings");
return;
}

// SAVE
db.ref("SchoolBell/schedules").push({
days: selectedDays,
timings: timings
});

db.ref("SchoolBell/updateFlag").set(true);

alert("Schedule added ✅");
}

// ❌ DELETE
function deleteSchedule(key){
if(confirm("Delete?")){
db.ref("SchoolBell/schedules/"+key).remove();
db.ref("SchoolBell/updateFlag").set(true);
}
}

// ✏️ EDIT DAYS
function editDays(key, currentDays){

let input = prompt("Edit days comma separated:", currentDays.join(","));

if(!input) return;

let newDays = input.split(",").map(d=>d.trim());

// CHECK CONFLICT
for(let d of newDays){
if(usedDays[d] && usedDays[d]!==key){
alert(d+" already used");
return;
}
}

// UPDATE
db.ref("SchoolBell/schedules/"+key+"/days").set(newDays);
db.ref("SchoolBell/updateFlag").set(true);

alert("Updated ✅");
}

</script>

</body>
</html>
